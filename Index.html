<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0c">
    <title>Gaming Tracker Premium</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at 50% 50%, #1a103c 0%, #07050f 100%);
            --card-bg: rgba(23, 20, 38, 0.65);
            --primary: #9466ff;
            --primary-glow: rgba(148, 102, 255, 0.5);
            --text: #f1f1f4;
            --text-muted: #9b9ba9;
            --success: #00ff87;
            --success-glow: rgba(0, 255, 135, 0.4);
            --warning: #ffb86c;
            --warning-bg: rgba(255, 184, 108, 0.1);
            --border: rgba(148, 102, 255, 0.15);
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0; 
            padding: 20px; 
        }

        .container { 
            background-color: var(--card-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px 25px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 420px; 
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
        }

        h1 { 
            text-align: center; 
            font-size: 1.8rem; 
            margin: 0 0 6px 0; 
            color: #fff; 
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #fff 0%, #bbb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { 
            text-align: center; 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            margin-bottom: 25px; 
            font-weight: 500;
        }

        .counter { 
            text-align: center; 
            font-size: 4rem; 
            font-weight: 900; 
            color: var(--primary); 
            margin: 10px 0 25px 0;
            text-shadow: 0 0 20px var(--primary-glow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: -1px;
        }

        .counter.complete { 
            color: var(--success);
            text-shadow: 0 0 25px var(--success-glow);
            transform: scale(1.05);
        }

        .recovery-box { 
            background: var(--warning-bg);
            border: 1px solid rgba(255, 184, 108, 0.25);
            padding: 14px;
            border-radius: 14px;
            font-size: 0.88rem; 
            text-align: center; 
            color: var(--warning); 
            margin-bottom: 25px; 
            font-weight: 600;
            box-shadow: inset 0 0 12px rgba(255, 184, 108, 0.05);
        }
        
        .recovery-box strong {
            font-size: 1.05rem;
            text-shadow: 0 0 8px rgba(255, 184, 108, 0.4);
        }

        .days-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 8px; 
            margin-bottom: 30px; 
        }

        .day-btn { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            color: var(--text-muted); 
            padding: 16px 0; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; 
        }

        .day-btn:hover:not(:disabled) {
            border-color: rgba(148, 102, 255, 0.4);
            color: #fff;
            background: rgba(148, 102, 255, 0.08);
        }
        
        .day-btn.active-normal { 
            background: linear-gradient(135deg, #9466ff 0%, #6b3ee3 100%); 
            border-color: #a67eff;
            box-shadow: 0 0 15px var(--primary-glow); 
            color: #fff; 
        }
        
        .day-btn.active-recovered { 
            background: linear-gradient(135deg, #ff4757 0%, #d63031 100%); 
            border-color: #ff6b81;
            box-shadow: 0 0 15px rgba(214, 48, 49, 0.4); 
            color: #fff; 
        }

        .day-btn.active-recovered::after { 
            content: '🔄'; 
            position: absolute; 
            font-size: 0.6rem; 
            bottom: 3px; 
            right: 3px; 
        }
        
        .day-btn:disabled { 
            opacity: 0.15; 
            cursor: not-allowed; 
            border-color: transparent;
            background: rgba(0, 0, 0, 0.2);
        }

        .day-btn.active-normal:disabled, 
        .day-btn.active-recovered:disabled { 
            opacity: 0.55; 
            box-shadow: none; 
        }

        .history-section { 
            border-top: 1px solid rgba(255, 255, 255, 0.08); 
            padding-top: 20px; 
        }

        .history-title { 
            font-size: 0.78rem; 
            color: var(--text-muted); 
            margin-bottom: 12px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        .history-list { 
            max-height: 200px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            padding-right: 2px;
        }

        /* Personalización barra de scroll del historial */
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .history-item { 
            display: flex; 
            flex-direction: column; 
            background: rgba(0, 0, 0, 0.2); 
            padding: 12px 14px; 
            border-radius: 14px; 
            font-size: 0.82rem; 
            border-left: 4px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: translateX(2px);
        }

        .history-item.completed-week { border-left-color: var(--success); background: rgba(0, 255, 135, 0.03); }
        .history-item.incomplete-week { border-left-color: #ff4757; background: rgba(255, 71, 87, 0.02); }
        
        .history-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 6px; 
        }

        .history-date { color: #fff; font-weight: 600; font-size: 0.85rem; }
        .history-details { display: flex; flex-direction: column; gap: 3px; font-size: 0.75rem; color: var(--text-muted); }
        .days-list-span { color: rgba(255, 255, 255, 0.85); font-weight: 500; }
        
        .status.ok { color: var(--success); font-weight: 700; text-shadow: 0 0 10px rgba(0, 255, 135, 0.2); }
        .status.fail { color: #ff4757; font-weight: 700; }

        .loading-overlay { 
            position: absolute; 
            top:0; left:0; width:100%; height:100%; 
            background: #07050f; 
            border-radius:24px; 
            display:flex; 
            justify-content:center; 
            align-items:center; 
            font-weight:700; 
            color: var(--primary); 
            z-index:10; 
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            transition: all 0.4s ease; 
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading" class="loading-overlay">Sincronizando la nube...</div>

        <h1>Tracker de Juego</h1>
        <div class="subtitle">Meta semanal base: 3 días</div>
        
        <div class="counter" id="counter">0 / 3</div>
        
        <div class="recovery-box">
            Días disponibles para recuperar: <strong id="pending-days">0</strong>
        </div>
        
        <div class="days-grid" id="days-grid"></div>
        
        <div class="history-section">
            <div class="history-title">Registro Histórico</div>
            <div id="history-list" class="history-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDMbp1mYL22ElQwCT5pvZZVyT14vTH29tU",
          authDomain: "tracker-juego.firebaseapp.com",
          projectId: "tracker-juego",
          storageBucket: "tracker-juego.firebasestorage.app",
          messagingSenderId: "1012741365382",
          appId: "1:1012741365382:web:74f7c87bc5fb7e285e3b07",
          measurementId: "G-SMFW0E8J0D"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "gamingTracker", "sharedState");

        let data = {
            lastUsedWeek: getWeekNumber(new Date()),
            weekDaysState: [null, null, null, null, null, null, null],
            pendingRecovery: 0,
            history: []
        };

        const dayNames = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
        }

        function getWeekRangeString(dateInput) {
            let current = new Date(dateInput);
            let day = current.getDay();
            let diffToMonday = current.getDate() - day + (day === 0 ? -6 : 1);
            let monday = new Date(current.setDate(diffToMonday));
            let sunday = new Date(current.setDate(monday.getDate() + 6));
            let f = (d) => `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}`;
            return `${f(monday)} al ${f(sunday)}`;
        }

        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                data = docSnap.data();
                const currentWeekNum = getWeekNumber(new Date());
                if (data.lastUsedWeek !== currentWeekNum) {
                    executeResetLogic(new Date());
                    return;
                }
            } else {
                saveToCloud();
            }
            document.getElementById('loading').classList.add('hidden');
            updateUI();
        });

        function executeResetLogic(referenceDate) {
            let normalCount = data.weekDaysState.filter(v => v === 'normal').length;
            let recoveredCount = data.weekDaysState.filter(v => v === 'recovered').length;
            let total = normalCount + recoveredCount;
            let dynamicTarget = 3 + recoveredCount;
            
            let normalDaysPlayed = [];
            let recoveredDaysPlayed = [];
            
            data.weekDaysState.forEach((state, index) => {
                if (state === 'normal') normalDaysPlayed.push(dayNames[index]);
                if (state === 'recovered') recoveredDaysPlayed.push(dayNames[index]);
            });

            if (total < dynamicTarget) {
                data.pendingRecovery += (dynamicTarget - total);
            }
            
            let pastWeekDate = new Date(referenceDate);
            pastWeekDate.setDate(pastWeekDate.getDate() - 7); 
            
            data.history.push({
                dateRange: getWeekRangeString(pastWeekDate),
                score: `${total}/${dynamicTarget}`,
                normalDays: normalDaysPlayed,
                recoveredDays: recoveredDaysPlayed
            });

            if (data.history.length > 5) data.history.shift();

            data.weekDaysState = [null, null, null, null, null, null, null];
            data.lastUsedWeek = getWeekNumber(referenceDate);
            saveToCloud();
        }

        window.handleDayClick = function(index) {
            let currentState = data.weekDaysState[index];
            let normalCount = data.weekDaysState.filter(v => v === 'normal').length;

            if (currentState === null) {
                if (normalCount < 3) {
                    data.weekDaysState[index] = 'normal';
                } else if (data.pendingRecovery > 0) {
                    data.weekDaysState[index] = 'recovered';
                    data.pendingRecovery--;
                }
            } else if (currentState === 'normal') {
                data.weekDaysState[index] = null;
            } else if (currentState === 'recovered') {
                data.weekDaysState[index] = null;
                data.pendingRecovery++;
            }
            
            saveToCloud();
        }

        function updateUI() {
            let normalCount = data.weekDaysState.filter(v => v === 'normal').length;
            let recoveredCount = data.weekDaysState.filter(v => v === 'recovered').length;
            let total = normalCount + recoveredCount;
            let currentTarget = 3 + recoveredCount;
            
            const counterEl = document.getElementById('counter');
            counterEl.textContent = `${total} / ${currentTarget}`;
            
            if (total >= currentTarget && normalCount >= 3) counterEl.classList.add('complete');
            else counterEl.classList.remove('complete');

            document.getElementById('pending-days').textContent = data.pendingRecovery;
            
            let todayJS = new Date().getDay();
            let todayIndex = todayJS === 0 ? 6 : todayJS - 1;

            const grid = document.getElementById('days-grid');
            grid.innerHTML = '';
            
            ['L', 'M', 'Mi', 'J', 'V', 'S', 'D'].forEach((d, i) => {
                const btn = document.createElement('button');
                let state = data.weekDaysState[i];
                
                btn.textContent = d;
                btn.className = 'day-btn';
                
                if (state === 'normal') btn.classList.add('active-normal');
                if (state === 'recovered') btn.classList.add('active-recovered');
                
                if (i < todayIndex) btn.disabled = true;
                if (state === null && normalCount >= 3 && data.pendingRecovery <= 0) btn.disabled = true;

                btn.onclick = () => handleDayClick(i);
                grid.appendChild(btn);
            });

            const histList = document.getElementById('history-list');
            histList.innerHTML = '';
            if (!data.history || data.history.length === 0) {
                histList.innerHTML = '<div style="color:#555; font-size:0.8rem; text-align:center; padding:15px 0;">Sin semanas registradas todavía.</div>';
            } else {
                [...data.history].reverse().forEach(h => {
                    const scores = h.score.split('/');
                    const isOk = parseInt(scores[0]) >= parseInt(scores[1]);
                    let txtNormales = h.normalDays.length > 0 ? h.normalDays.join(', ') : 'Ninguno';
                    let txtRecuperados = h.recoveredDays.length > 0 ? h.recoveredDays.join(', ') : 'Ninguno';

                    histList.innerHTML += `
                        <div class="history-item ${isOk ? 'completed-week' : 'incomplete-week'}">
                            <div class="history-header">
                                <span class="history-date">Semana ${h.dateRange}</span>
                                <span class="status ${isOk ? 'ok' : 'fail'}">${h.score}</span>
                            </div>
                            <div class="history-details">
                                <div>• Normales: <span class="days-list-span">${txtNormales}</span></div>
                                <div>• Recuperados: <span class="days-list-span">${txtRecuperados}</span></div>
                            </div>
                        </div>
                    `;
                });
            }
        }

        async function saveToCloud() {
            await setDoc(docRef, data);
        }
    </script>
</body>
</html>
